<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Smart Parking Slot Detection</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<nav class="navbar navbar-dark bg-dark shadow">

<div class="container-fluid">

<span class="navbar-brand">

<i class="fa-solid fa-square-parking"></i>

Smart Parking Slot Detection System

</span>

<span class="text-light">

YOLOv11 Real-Time Monitoring

</span>

</div>

</nav>

<div class="container-fluid mt-4">

<div class="row">

<!-- LEFT -->

<div class="col-lg-8">

<div class="card shadow-lg border-0">

<div class="card-header">

<h5>

<i class="fa-solid fa-video"></i>

Detection Preview

</h5>

</div>

<div class="card-body text-center">

<img

id="preview"

src="https://placehold.co/900x520/1e293b/ffffff?text=Waiting+for+Detection"

class="img-fluid rounded"

>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="col-lg-4">

<div class="card shadow border-0 mb-3">

<div class="card-header">

<h5>

<i class="fa-solid fa-sliders"></i>

Detection Mode

</h5>

</div>

<div class="card-body">

<button class="btn btn-primary w-100 mb-3" id="btnImage">

<i class="fa-solid fa-image"></i>

Upload Image

</button>

<input type="file"

id="imageInput"

accept="image/*"

hidden>

<button class="btn btn-success w-100 mb-3"

id="btnVideo">

<i class="fa-solid fa-film"></i>

Upload Video

</button>

<input type="file"

id="videoInput"

accept="video/*"

hidden>

<button class="btn btn-danger w-100 mb-3"

id="btnCamera">

<i class="fa-solid fa-camera"></i>

Live Camera

</button>

<button class="btn btn-secondary w-100"

id="btnStop">

<i class="fa-solid fa-stop"></i>

Stop Detection

</button>

</div>

</div>

<!-- Statistics -->

<div class="row g-3">

<div class="col-6">

<div class="card stat-card bg-primary">

<div class="card-body">

<h6>Total Slot</h6>

<h2 id="totalSlot">0</h2>

</div>

</div>

</div>

<div class="col-6">

<div class="card stat-card bg-success">

<div class="card-body">

<h6>Empty</h6>

<h2 id="emptySlot">0</h2>

</div>

</div>

</div>

<div class="col-6">

<div class="card stat-card bg-danger">

<div class="card-body">

<h6>Occupied</h6>

<h2 id="occupiedSlot">0</h2>

</div>

</div>

</div>

<div class="col-6">

<div class="card stat-card bg-warning">

<div class="card-body">

<h6>FPS</h6>

<h2 id="fps">0</h2>

</div>

</div>

</div>

</div>

</div>

</div>

<!-- TABLE -->

<div class="card shadow border-0 mt-4">

<div class="card-header">

<h5>

<i class="fa-solid fa-table"></i>

Detection Result

</h5>

</div>

<div class="card-body">

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead class="table-dark">

<tr>

<th>Slot</th>

<th>Status</th>

<th>Confidence</th>

</tr>

</thead>

<tbody id="resultTable">

<tr>

<td colspan="3"

class="text-center">

No Detection

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

<!-- Loading -->

<div id="loadingOverlay">

<div class="spinner-border text-light"></div>

<h5 class="mt-3 text-light">

Processing...

</h5>

</div>

<footer class="text-center mt-5 mb-4">

Developed by

<strong>

Rizki Fajari

</strong>

<br>

2255301167

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
