<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Smart Parking Detection</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container py-4">

    <h2 class="text-center fw-bold mb-4">

        🚗 Smart Parking Detection

    </h2>

    <div class="row mb-4">

        <div class="col-md-4">

            <div class="card shadow text-center">

                <div class="card-body">

                    <h5>Available</h5>

                    <h1 id="available">0</h1>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow text-center">

                <div class="card-body">

                    <h5>Occupied</h5>

                    <h1 id="occupied">0</h1>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow text-center">

                <div class="card-body">

                    <h5>Total Slot</h5>

                    <h1 id="total">0</h1>

                </div>

            </div>

        </div>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <input
                class="form-control mb-3"
                type="file"
                id="imageInput"
                accept="image/*">

            <button
                class="btn btn-primary w-100"
                onclick="uploadImage()">

                Detect Parking Slot

            </button>

        </div>

    </div>

    <div class="mt-4">

        <img
            id="resultImage"
            class="img-fluid rounded shadow">

    </div>

    <div class="card mt-4 shadow">

        <div class="card-header">

            Detection Result

        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <thead>

                <tr>

                    <th>No</th>

                    <th>Status</th>

                    <th>Confidence</th>

                </tr>

                </thead>

                <tbody id="resultTable">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
